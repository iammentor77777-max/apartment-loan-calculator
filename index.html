<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apartment Loan Calculator</title>
</head>
<body>
    <h1>Apartment Loan Calculator</h1>
    <form id="loanCalculator">
        <label for="loanAmount">Loan Amount:</label>
        <input type="number" id="loanAmount" required>
        <br>
        <label for="interestRate">Interest Rate (%):</label>
        <input type="number" step="0.01" id="interestRate" required>
        <br>
        <label for="loanTerm">Loan Term (years):</label>
        <input type="number" id="loanTerm" required>
        <br>
        <button type="submit">Calculate</button>
    </form>
    <h2>Monthly Payment: <span id="monthlyPayment"></span></h2>

    <script>
        document.getElementById('loanCalculator').addEventListener('submit', function(event) {
            event.preventDefault();
            const loanAmount = parseFloat(document.getElementById('loanAmount').value);
            const interestRate = parseFloat(document.getElementById('interestRate').value) / 100 / 12;
            const loanTerm = parseFloat(document.getElementById('loanTerm').value) * 12;
            const x = Math.pow(1 + interestRate, loanTerm);
            const monthlyPayment = (loanAmount*x*interestRate) / (x-1);
            document.getElementById('monthlyPayment').innerText = monthlyPayment.toFixed(2);
        });
    </script>
</body>
</html>
